<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedCalc Hospitalar</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#2c3e50">
    <meta name="apple-mobile-web-app-title" content="MedCalc">
    <link rel="apple-touch-icon" href="./assets/icons/icon-192x192.png">
    
    <meta name="theme-color" content="#3498db">

    <style>
        :root {
            --bg-primary: #2c3e50;
            --bg-secondary: #34495e;
            --accent: #3498db;
            --text: #ffffff;
            --success: #27ae60;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 1.6rem;
            color: var(--accent);
        }

        p.subtitle {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 2px;
        }

        main {
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .calc-section h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background-color: #1a252f;
            color: #fff;
            font-size: 1rem;
        }

        .btn-calc {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-calc:active {
            background-color: #2980b9;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #1a252f;
            border-left: 5px solid var(--success);
            border-radius: 4px;
            display: none;
        }

        .result-box p {
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .result-box span {
            font-weight: bold;
            color: var(--success);
        }
    </style>
</head>
<body>

    <header>
        <h1>MedCalc Hospitalar</h1>
        <p class="subtitle">Calculadoras de bolso para rotina médica</p>
    </header>

    <main id="app-container">
        <div class="calc-section">
            <h2>Gotejamento de Soro</h2>
            
            <div class="input-group">
                <label for="volume">Volume do Soro (ml):</label>
                <input type="number" id="volume" placeholder="Ex: 500" inputmode="numeric">
            </div>

            <div class="input-group">
                <label for="tempo">Tempo de Infusão (Horas):</label>
                <input type="number" id="tempo" placeholder="Ex: 4" inputmode="numeric">
            </div>

            <div class="input-group">
                <label for="tipo">Tipo de Gota:</label>
                <select id="tipo">
                    <option value="macro">Macrogotas (Gotas/min)</option>
                    <option value="micro">Microgotas (Microgotas/min)</option>
                </select>
            </div>

            <button class="btn-calc" onclick="calcularGotejamento()">Calcular Gotas</button>

            <div class="result-box" id="resultado">
                <p>Resultado:</p>
                <p style="font-size: 1.2rem;"><span id="valor-resultado">0</span> por minuto</p>
            </div>
        </div>
    </main>

    <script>
        function calcularGotejamento() {
            const volume = parseFloat(document.getElementById('volume').value);
            const tempo = parseFloat(document.getElementById('tempo').value);
            const tipo = document.getElementById('tipo').value;
            const resBox = document.getElementById('resultado');
            const resVal = document.getElementById('valor-resultado');

            if (!volume || !tempo || volume <= 0 || tempo <= 0) {
                alert('Por favor, insira valores válidos para Volume e Tempo.');
                return;
            }

            let resultado = 0;
            if (tipo === 'macro') {
                resultado = Math.round(volume / (tempo * 3));
            } else {
                resultado = Math.round(volume / tempo);
            }

            resVal.innerText = resultado;
            resBox.style.display = 'block';
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado!'))
                    .catch(err => console.error('Erro no SW:', err));
            });
        }
    </script>
</body>
</html>
