<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedCalc Enfermagem</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#2c3e50">
    <meta name="apple-mobile-web-app-title" content="MedCalc Enf">
    <meta name="theme-color" content="#27ae60">
    
    <style>
        :root {
            --bg-primary: #1e272e;
            --bg-secondary: #2f3542;
            --accent: #27ae60;
            --text: #ffffff;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin-top: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        header {
            text-align: center;
            margin-bottom: 12px;
            width: 100%;
            max-width: 500px;
        }

        h1 { font-size: 1.5rem; color: var(--accent); }
        p.subtitle { font-size: 0.8rem; opacity: 0.7; }

        .nav-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            max-width: 500px;
            background-color: #1a252f;
            border-radius: 8px;
            margin-bottom: 12px;
            padding: 3px;
            gap: 2px;
        }

        .tab-btn {
            padding: 12px 2px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            opacity: 0.6;
        }

        .tab-btn.active { background-color: var(--accent); opacity: 1; }

        main {
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }

        .calc-page { display: none; }
        .calc-page.active { display: block; }
        
        h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 4px;
        }

        .calc-sub-section {
            background: rgba(0,0,0,0.15);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .calc-sub-section h3 { font-size: 0.95rem; margin-bottom: 10px; color: #ecf0f1; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.85rem; margin-bottom: 4px; }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background-color: #1a252f;
            color: #fff;
            font-size: 0.95rem;
        }

        .btn-calc {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }

        .result-box {
            margin-top: 15px;
            padding: 12px;
            background-color: #1a252f;
            border-left: 5px solid var(--success);
            border-radius: 4px;
            display: none;
            font-size: 0.9rem;
        }

        .info-card {
            background-color: #1a252f;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
        }
        .info-card.warning { border-left-color: var(--warning); }
        .info-card.danger { border-left-color: var(--danger); }
        .info-card h3 { font-size: 0.9rem; margin-bottom: 5px; color: var(--accent); }
        .info-card p, .info-card ul { font-size: 0.8rem; opacity: 0.8; line-height: 1.35; }
        .info-card ul { margin-left: 15px; margin-top: 5px; }

        footer {
            text-align: center;
            font-size: 0.65rem;
            opacity: 0.4;
            width: 100%;
            max-width: 500px;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <svg width="100" height="100" viewBox="0 0 24 24" fill="none" xmlns="http://w3.org">
            <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM17 13H13V17H11V13H7V11H11V7H13V11H17V13Z" fill="#27ae60"/>
        </svg>
        <h2 style="border:none; margin-top:15px; color:#fff;">MedCalc Enfermagem</h2>
        <div class="spinner"></div>
    </div>

    <header>
        <h1>MedCalc Enfermagem</h1>
        <p class="subtitle">Calculadoras Práticas para a Equipe de Enfermagem</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'soro')">Infusões</button>
        <button class="tab-btn" onclick="switchTab(event, 'med')">Cálculos/Med</button>
        <button class="tab-btn" onclick="switchTab(event, 'alertas')">Alertas</button>
    </div>

    <main id="app-container">
        
        <!-- ABA 1: INFUSÕES E CONTROLE FLUIDOTERÁPICO -->
        <div id="page-soro" class="calc-page active">
            <div class="calc-sub-section">
                <h3>1. Gotejamento Gravitacional</h3>
                <div class="input-group">
                    <label>Volume Total (mL):</label>
                    <input type="number" id="volume" placeholder="Ex: 500" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>Tempo de Infusão:</label>
                    <input type="number" id="tempo" placeholder="Ex: 8" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>Unidade de Tempo:</label>
                    <select id="tempo-unidade">
                        <option value="horas">Horas</option>
                        <option value="minutos">Minutos</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Tipo de Equipo:</label>
                    <select id="tipo">
                        <option value="macro">Macrogotas</option>
                        <option value="micro">Microgotas</option>
                    </select>
                </div>
                <button class="btn-calc" onclick="calcularGotejamento()">Calcular Gotas</button>
                <div class="result-box" id="resultado-soro">
                    <p>Velocidade: <strong id="valor-soro">0</strong></p>
                </div>
            </div>

            <div class="calc-sub-section">
                <h3>2. Bomba de Infusão (BIC / mL por Hora)</h3>
                <div class="input-group">
                    <label>Volume Total (mL):</label>
                    <input type="number" id="bic-vol" placeholder="Ex: 250" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>Tempo (Horas):</label>
                    <input type="number" id="bic-tempo" placeholder="Ex: 4" inputmode="numeric">
                </div>
                <button class="btn-calc" onclick="calcularBicEnf()">Calcular mL/h</button>
                <div class="result-box" id="resultado-bic">
                    <p>Programar BIC: <strong id="valor-bic">0</strong> mL/h</p>
                </div>
            </div>

            <div class="calc-sub-section">
                <h3>3. Transformação de Soro (SG 5% para SG 10%)</h3>
                <div class="input-group">
                    <label>Volume do Soro de Base SG 5% (mL):</label>
                    <input type="number" id="trans-vol" placeholder="Ex: 500" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>Volume da Ampola de Glicose 50% disponível (mL):</label>
                    <input type="number" id="trans-amp" placeholder="Ex: 20" inputmode="numeric">
                </div>
                <button class="btn-calc" onclick="calcularTransformacao()">Calcular Adição</button>
                <div class="result-box" id="resultado-trans">
                    <p>Adicionar ao frasco: <strong id="valor-trans">0</strong> mL (equivale a <span id="amp-quant">0</span> ampolas)</p>
                </div>
            </div>
        </div>
