<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedCalc Enfermagem</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#16a085">
    <meta name="apple-mobile-web-app-title" content="MedCalc Enf">
    <meta name="theme-color" content="#16a085">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #16a085; /* Verde Esmeralda da Enfermagem */
            --accent-light: #26de1a;
            --text: #f8fafc;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text);
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Splash Screen Premium com a Lâmpada da Enfermagem */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .splash-logo-container {
            position: relative;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pulse-ring {
            position: absolute;
            width: 140px;
            height: 140px;
            border: 3px solid var(--accent);
            border-radius: 50%;
            animation: pulse-grow 2s infinite ease-out;
            opacity: 0;
        }

        @keyframes pulse-grow {
            0% { transform: scale(0.6); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
            margin-top: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        header {
            text-align: center;
            margin-bottom: 16px;
            width: 100%;
            max-width: 480px;
        }

        header h1 {
            font-size: 1.6rem;
            color: var(--accent);
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        p.subtitle {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        .nav-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            max-width: 480px;
            background-color: #020617;
            border-radius: 12px;
            margin-bottom: 16px;
            padding: 4px;
            gap: 4px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .tab-btn {
            padding: 12px 2px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
            transition: all 0.2s ease;
            opacity: 0.5;
        }

        .tab-btn.active {
            background-color: var(--accent);
            color: #ffffff;
            opacity: 1;
            box-shadow: 0 4px 10px rgba(22, 160, 133, 0.3);
        }

        main {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            margin-bottom: 30px;
        }

        .calc-page { display: none; }
        .calc-page.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 {
            font-size: 1.15rem;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 6px;
            color: #ffffff;
        }

        .calc-sub-section {
            background: rgba(15, 23, 42, 0.4);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .calc-sub-section h3 { 
            font-size: 0.95rem; 
            margin-bottom: 12px; 
            color: #cbd5e1; 
            font-weight: 600;
        }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.85rem; margin-bottom: 6px; color: #94a3b8; }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            background-color: #0f172a;
            color: #fff;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-calc {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
            transition: filter 0.2s;
        }

        .btn-calc:active { filter: brightness(0.9); }

        .result-box {
            margin-top: 15px;
            padding: 14px;
            background-color: #0f172a;
            border-left: 5px solid var(--success);
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown { from { transform: translateY(-5px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .info-card {
            background-color: #0f172a;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent);
        }
        .info-card.warning { border-left-color: var(--warning); }
        .info-card.danger { border-left-color: var(--danger); }
        .info-card h3 { font-size: 0.95rem; margin-bottom: 6px; color: var(--accent); font-weight: 700; }
        .info-card p, .info-card ul { font-size: 0.85rem; color: #cbd5e1; line-height: 1.4; }
        .info-card ul { margin-left: 18px; margin-top: 6px; }
        .info-card li { margin-bottom: 4px; }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #64748b;
            width: 100%;
            max-width: 480px;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- Splash Screen Premium: Símbolo Oficial da Enfermagem (Lâmpada de Florence) -->
    <div id="splash-screen">
        <div class="splash-logo-container">
            <div class="pulse-ring"></div>
            <svg width="120" height="120" viewBox="0 0 64 64" fill="none" xmlns="http://w3.org">
                <!-- Linha do chão/suporte -->
                <path d="M12 48H44" stroke="#16a085" stroke-width="3" stroke-linecap="round"/>
                <!-- Corpo da Lâmpada a óleo -->
                <path d="M16 48C16 48 10 42 10 34C10 28 15 26 22 26C30 26 36 32 46 32C52 32 56 28 56 28C56 28 53 35 48 40C43 45 34 48 28 48H16Z" fill="#16a085" stroke="#1e293b" stroke-width="2"/>
                <!-- Alça da Lâmpada -->
                <path d="M14 36C10 36 6 32 6 26C6 18 14 16 18 22" stroke="#16a085" stroke-width="3" stroke-linecap="round"/>
                <!-- Bocal da chama -->
                <path d="M52 28L55 23" stroke="#16a085" stroke-width="3" stroke-linecap="round"/>
                <!-- Chama da Ciência e Responsabilidade Profissional -->
                <path d="M55 21C55 21 52 14 55 8C58 14 60 17 58 21C56.5 23 55 21 55 21Z" fill="#f1c40f" cubic-gradient="true"/>
                <!-- Cruz da saúde sutil flutuante -->
                <path d="M26 12H32M29 9V15" stroke="#2ecc71" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>
        <h2 style="border:none; margin-top:5px; color:#fff; font-weight:800; letter-spacing:0.5px;">MedCalc Enfermagem</h2>
        <p style="color: #94a3b8; font-size:0.8rem; margin-top:4px;">Ciência e Cuidado</p>
        <div class="spinner"></div>
    </div>

    <header>
        <h1>
            <svg width="24" height="24" viewBox="0 0 64 64" fill="none" xmlns="http://w3.org" style="display:inline-block; vertical-align:middle;">
                <path d="M16 48C16 48 10 42 10 34C10 28 15 26 22 26C30 26 36 32 46 32C52 32 56 28 56 28C56 28 53 35 48 40C43 45 34 48 28 48H16Z" fill="#16a085"/>
